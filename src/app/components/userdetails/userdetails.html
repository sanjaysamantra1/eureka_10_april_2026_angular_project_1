<h3 class="text-center">User Details</h3>

<div class="col-sm-4 offset-4 border border-3 rounded-3 p-3">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSeyY8vIP-4slcgPPm6doHmd556OwXtdwUOzQ&s"
      class="card-img-top" alt="..." height="200px">
    <div class="card-body text-center">
      <h5 class="card-title">{{user().name}}</h5>
      <p class="card-text text-truncate">{{user().username}}</p>
      <p class="card-text text-truncate">{{user().email}}</p>
      <p class="card-text">{{user().phone}}</p>
      <p class="card-text">{{user().address.city}}</p>
    </div>
</div>
